<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="/logo.png">
  <title>REIINN-ventory | Portal</title>
  <link rel="stylesheet" href="/src/styles/variables.css">
  <link rel="stylesheet" href="/src/styles/layout.css">
  <link rel="stylesheet" href="/src/styles/components.css">
</head>
<body>
  <div id="live-clock">
    <span id="clock-time">00:00:00 AM</span>
    <span id="clock-date">Monday, January 01, 2026</span>
  </div>
  <div id="main-app">
    <div class="sidebar">
      <div class="sidebar-header">
        <div style="display: flex; align-items: center; gap: 10px;">
          <div class="notif-wrapper" id="notifWrapper">
            <span class="notif-bell">🔔</span>
            <span id="notif-badge" class="notif-badge">0</span>
            <div id="notif-dropdown" class="notif-dropdown" onclick="event.stopPropagation()">
              <div class="notif-header">
                Notifications
                <button class="btn-clear-notif" id="notifClearAll">Clear All</button>
              </div>
              <div id="notif-list"></div>
            </div>
          </div>
          <span style="font-size: 16px; letter-spacing: 0.5px;">REIINN-ventory</span>
        </div>
        <img src="/logo.png" class="sidebar-logo" alt="Logo">
      </div>
      <div class="menu-item active" data-route="dashboard"><span>📊 Dashboard</span></div>
      <div class="menu-item" id="inv-menu" data-route="inventory">
        <span>📦 Inventory</span>
        <svg class="menu-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div id="inv-submenu" class="submenu">
        <div class="sub-item" data-route="inventory-list">Inventory List</div>
        <div class="sub-item admin-only" data-route="inventory-registry">Inventory Registry</div>
      </div>
      <div class="menu-item" data-route="scheduling"><span>📅 Scheduling</span></div>
      <div class="menu-item" data-route="deliveries"><span>🚚 Deliveries</span></div>
      <div class="menu-item" data-route="procurement"><span>🛒 Procurement</span></div>
      <div class="menu-item" data-route="gatepass"><span>🎫 Gate Pass</span></div>
      <div class="menu-item" data-route="deployment"><span>🛠️ Deployed Equipment</span></div>
      <div class="sidebar-footer">
        <span id="user-role" class="user-role"></span>
        <div class="logout">Log Out</div>
      </div>
    </div>
    <div id="content-area" class="content-section"></div>
  </div>
  <div id="descModal" class="modal-overlay" style="display:none;">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h3 id="modalTitle" style="margin-top:0">Details</h3>
      <div id="fullDescText" style="font-size: 14px; line-height: 1.5; color: #334155;"></div>
      <button id="modalClose" class="btn-action" style="background:var(--primary-dark); width:100%; margin-top:20px;">Close</button>
    </div>
  </div>
  <script type="module" src="/src/app.js"></script>
</body>
</html>
