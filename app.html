<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="/logo.png">
  <title>REIINN-ventory | Portal</title>
  <link rel="stylesheet" href="/src/styles/variables.css">
  <link rel="stylesheet" href="/src/styles/layout.css">
  <link rel="stylesheet" href="/src/styles/components.css">
  <link rel="stylesheet" href="/src/styles/responsive.css">
</head>
<body>
  <div class="app-header" id="appHeader">
    <div class="app-header-left">
      <button type="button" class="btn-hamburger" id="btnHamburger" aria-label="Toggle menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="notif-wrapper" id="notifWrapper">
        <svg class="notif-bell menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <span id="notif-badge" class="notif-badge">0</span>
        <div id="notif-dropdown" class="notif-dropdown" onclick="event.stopPropagation()">
          <div class="notif-header">
            Notifications
            <button class="btn-clear-notif" id="notifClearAll">Clear All</button>
          </div>
          <div id="notif-list"></div>
        </div>
      </div>
    </div>
    <div class="app-header-right">
      <div id="live-clock" class="live-clock-inline">
        <span id="clock-date">Monday, January 01, 2026 Philippine Standard Time</span>
        <span id="clock-time">00:00:00 AM</span>
      </div>
      <div class="logout">Log Out</div>
    </div>
  </div>
  <div id="main-app">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-header-left">
          <span class="sidebar-title">REIINN-ventory</span>
          <span id="user-role" class="user-role"></span>
        </div>
        <img src="/logo.png" class="sidebar-logo" alt="Logo">
      </div>
      <div class="menu-item active" data-route="dashboard"><span class="menu-item-content"><svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>Dashboard</span></div>
      <div class="menu-item" id="inv-menu" data-route="inventory">
        <span class="menu-item-content"><svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 9.4 7.55 4.24"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="m3.27 6.96 9 5.01"/><path d="M12 22.08V11"/><path d="m21 16-9-5.01"/><path d="M12 11 3 16"/></svg>Inventory</span>
        <svg class="menu-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div id="inv-submenu" class="submenu">
        <div class="sub-item" data-route="inventory-list">Inventory List</div>
        <div class="sub-item admin-only" data-route="inventory-registry">Inventory Registry</div>
      </div>
      <div class="menu-item" data-route="scheduling"><span class="menu-item-content"><svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>Scheduling</span></div>
      <div class="menu-item" data-route="deliveries"><span class="menu-item-content"><svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11"/><path d="M15 18h2"/><path d="M19 18h2"/><path d="M19 18a2 2 0 0 0 1.3-3.5"/><path d="M2 13h13"/></svg>Deliveries</span></div>
      <div class="menu-item" data-route="procurement"><span class="menu-item-content"><svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>Procurement</span></div>
      <div class="menu-item" data-route="gatepass"><span class="menu-item-content"><svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>Gate Pass</span></div>
      <div class="menu-item" data-route="deployment"><span class="menu-item-content"><svg class="menu-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>Deployed Equipment</span></div>
    </div>
    <div id="content-area" class="content-section"></div>
  </div>
  <div id="descModal" class="modal-overlay" style="display:none;">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h3 id="modalTitle" style="margin-top:0">Details</h3>
      <div id="fullDescText" style="font-size: 14px; line-height: 1.5; color: #334155;"></div>
      <button id="modalClose" class="btn-action" style="background:var(--primary-dark); width:100%; margin-top:20px;">Close</button>
    </div>
  </div>
  <script type="module" src="/src/app.js"></script>
</body>
</html>
