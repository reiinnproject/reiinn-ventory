<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REIINN-ventory | Login</title>
  <link rel="stylesheet" href="/src/styles/variables.css">
  <link rel="stylesheet" href="/src/styles/layout.css">
  <link rel="stylesheet" href="/src/styles/components.css">
</head>
<body>
  <div id="login-screen">
    <img src="/logo.png" class="login-logo" alt="Logo">
    <h1>REIINN-ventory</h1>
    <input type="text" id="userInput" placeholder="Username">
    <input type="password" id="passInput" placeholder="Password">
    <button class="btn-login" onclick="login()">Login</button>
    <p id="err" style="display:none; color:var(--danger-red); font-size:12px; margin-top:10px;">Login Failed</p>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
