<h1>Inventory List</h1>
<input type="text" class="search-bar" id="invSearch" placeholder="Search Inventory...">
<table>
  <thead>
    <tr>
      <th>Stock #</th>
      <th>Item Name</th>
      <th>Description</th>
      <th>Location</th>
      <th>Balance</th>
      <th>Color</th>
      <th>Category</th>
      <th class="admin-only">Action</th>
    </tr>
  </thead>
  <tbody id="invBody"></tbody>
</table>
<div class="inv-pagination-wrap">
  <div class="inv-pagination" id="invPagination">
    <button type="button" class="inv-pg-btn inv-pg-first" id="invFirst" title="First page">«</button>
    <div class="inv-pg-numbers" id="invPgNumbers"></div>
    <button type="button" class="inv-pg-btn inv-pg-last" id="invLast" title="Last page">»</button>
  </div>
</div>
