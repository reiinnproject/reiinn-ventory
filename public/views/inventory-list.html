<h1>Inventory List</h1>
<input type="text" class="search-bar" id="invSearch" placeholder="Search Inventory...">
<table>
  <thead>
    <tr>
      <th>Stock #</th>
      <th>Item Name</th>
      <th>Description</th>
      <th>Location</th>
      <th>Balance</th>
      <th>Color</th>
      <th>Category</th>
      <th class="admin-only">Action</th>
    </tr>
  </thead>
  <tbody id="invBody"></tbody>
</table>
<div class="inv-pagination" id="invPagination">
  <button type="button" class="btn-pagination" id="invPrev" disabled>← Previous</button>
  <select id="invPageSelect" class="inv-page-select" aria-label="Page selection"></select>
  <button type="button" class="btn-pagination" id="invNext" disabled>Next →</button>
</div>
