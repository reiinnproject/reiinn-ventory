<h1>Operational Overview</h1>
<div class="stats-grid">
  <div class="card"><h3>Total Assets</h3><p id="dash-total">0</p></div>
  <div class="card"><h3>Active POs</h3><p id="dash-deliv">0</p></div>
  <div class="card"><h3>Gate Pass Requests</h3><p id="dash-gp">0</p></div>
</div>

<div class="calendar-container">
  <div class="calendar-header">
    <div style="display: flex; flex-direction: column; gap: 10px;">
      <h3 id="calMonth" style="margin:0; font-size: 16px;">Schedule Overview</h3>
      <div class="filter-group" style="margin-bottom:0">
        <button class="btn-filter active" id="cal-filter-All" data-cal-filter="All">All</button>
        <button class="btn-filter" id="cal-filter-GatePass" data-cal-filter="GatePass">Gate Pass</button>
        <button class="btn-filter" id="cal-filter-Schedule" data-cal-filter="Schedule">Schedules</button>
      </div>
    </div>
    <div class="calendar-nav">
      <button class="calendar-btn" id="cal-prev">❮</button>
      <select id="calYearSelect" style="padding:4px; border-radius:4px; border:1px solid var(--border-color);"></select>
      <button class="calendar-btn" id="cal-next">❯</button>
    </div>
  </div>
  <div class="calendar-grid" id="calendarGrid"></div>
</div>
